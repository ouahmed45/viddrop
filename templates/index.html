<div style="text-align: center; margin-top: 50px;">
    <form onsubmit="startDownload(event)">
        <input type="url" id="videoUrl" placeholder="Collez le lien YouTube ici..." required style="width: 70%; padding: 12px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; margin-bottom: 15px;">
        <br>
        <select id="videoFormat" style="padding: 12px; font-size: 16px; border-radius: 5px; margin-right: 10px;">
            <option value="mp3">Audio MP3</option>
            <option value="mp4">Vidéo MP4</option>
        </select>
        <button type="submit" style="padding: 12px 25px; font-size: 16px; background-color: #ff0000; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Télécharger</button>
    </form>
</div>

<script>
function startDownload(event) {
    event.preventDefault();
    let url = document.getElementById('videoUrl').value;
    let format = document.getElementById('videoFormat').value;
    
    url = url.trim();

    // Extraction magique de l'ID de n'importe quelle vidéo YouTube
    let videoId = "";
    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
    const match = url.match(regExp);
    
    if (match && match[2].length === 11) {
        videoId = match[2];
    } else {
        alert("Veuillez entrer un lien YouTube valide.");
        return;
    }

    // On génère le lien de téléchargement direct (qui utilise la connexion de l'utilisateur)
    let downloadUrl = "";
    if (format === "mp3") {
        downloadUrl = `https://api.vexdh.com/download?id=${videoId}&type=mp3`;
    } else {
        downloadUrl = `https://api.vexdh.com/download?id=${videoId}&type=mp4`;
    }
    
    // Ouvre le téléchargement instantanément dans un nouvel onglet
    window.open(downloadUrl, '_blank');
}
</script>
